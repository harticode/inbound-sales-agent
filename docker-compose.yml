services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: carrier-sales-app
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next:/app/.next
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: carrier-sales-postgres
    environment:
      POSTGRES_USER: carrier
      POSTGRES_PASSWORD: carrier
      POSTGRES_DB: carrier_sales
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carrier -d carrier_sales"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  app_node_modules:
  app_next:
